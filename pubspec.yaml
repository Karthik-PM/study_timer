name: study_timer
description: A study timer app with tags, history, and analytics.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  fl_chart: ^0.68.0
  excel: ^4.0.6
  share_plus: ^10.0.0
  intl: ^0.19.0
  uuid: ^4.4.2
  path_provider: ^2.1.3
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  qr_flutter: ^4.1.0
  network_info_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
